<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HTML Playground</title>
<meta name="description" content="Online HTML Playground untuk menulis, mengedit, dan menjalankan kode HTML, CSS, dan JavaScript langsung di browser dengan editor modern dan fitur autocomplete.">
<meta name="robots" content="index, follow">
<meta name="author" content="Nopiyar">
<meta name="theme-color" content="#0f172a">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/foldgutter.min.css"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="shield"></div>

<div id="toolbar">
  <div class="brand">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
    <span>HTML Playground</span>
  </div>
  <div class="sep"></div>
  <button class="btn" id="fmt-btn" title="Format (Shift+Alt+F)">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="21" y1="10" x2="7" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="7" y2="18"/></svg>
    Format
  </button>
  <button class="btn" id="find-btn" title="Find & Replace (Ctrl+F)">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    Find
  </button>
  <button class="btn" id="wrap-btn" title="Toggle Word Wrap">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
    Wrap
  </button>
  <div class="sep"></div>
  <button class="btn" id="snip-btn" title="Snippets">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    Snippets
  </button>
  <button class="btn" id="copy-btn" title="Copy code">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    Copy
  </button>
  <div class="ml">
    <select class="sel" id="theme-sel" title="Theme">
      <option value="vscode">VSCode Dark</option>
      <option value="sublime">Sublime Text</option>
      <option value="light">Light</option>
    </select>
    <div class="sep"></div>
    <button class="btn" id="fd" title="Smaller font">A−</button>
    <span id="fb">13</span>
    <button class="btn" id="fi" title="Larger font">A+</button>
  </div>
</div>

<div id="main">
  <div id="ep">
    <div id="tabs">
      <div class="tab active">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#f47067" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        index.html<span class="tdot"></span>
      </div>
    </div>
    <div id="ew">
      <div id="fb-bar">
        <input class="fi" id="fi-in" placeholder="Find…"/>
        <input class="fi" id="ri-in" placeholder="Replace…"/>
        <span id="fc">0/0</span>
        <button class="fbb" id="fp">↑</button>
        <button class="fbb" id="fn">↓</button>
        <button class="fbb" id="frepl">Replace</button>
        <button class="fbb" id="fclose">✕</button>
      </div>
      <div id="cmhost"></div>
    </div>
  </div>

  <div id="rh"></div>

  <div id="pp">
    <div id="ptabs">
      <button class="ptab active" data-v="preview">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Preview
      </button>
      <button class="ptab" data-v="console">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
        Console
        <span id="ebadge" style="display:none;background:#f47067;color:#fff;border-radius:9px;padding:0 5px;font-size:10px;min-width:16px;text-align:center"></span>
      </button>
      <span id="pinfo" style="margin-left:auto;font-size:11px;color:var(--text3)">—</span>
    </div>
    <iframe id="pframe" sandbox="allow-scripts allow-same-origin allow-modals allow-forms allow-popups"></iframe>
    <div id="cpanel">
      <div id="cbar">
        <span id="ccount">0 messages</span>
        <button id="clr">🗑 Clear</button>
      </div>
      <div id="cout"><div class="mty">No output yet — code runs automatically.</div></div>
    </div>
  </div>
</div>

<div id="sb">
  <span class="si">HTML</span><span class="ss">|</span>
  <span class="si" id="sbpos">Ln 1, Col 1</span><span class="ss">|</span>
  <span class="si" id="sbsz">0 B</span><span class="ss">|</span>
  <span class="si" id="sblive" style="cursor:pointer">● Live</span>
  <div class="sr"><span class="si" id="sbdim">—</span><span class="si">HTML Playground</span></div>
</div>

<div id="toast"></div>

<div id="ov">
  <div id="modal">
    <h3>Insert Snippet</h3>
    <p>Pilih snippet lalu klik Insert.</p>
    <div id="mbody"></div>
    <div class="mact">
      <button class="mb" id="mcancel">Cancel</button>
      <button class="mb pri" id="mok">Insert</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/html-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/javascript-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closetag.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/selection/active-line.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/search/searchcursor.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/comment/comment.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/foldcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/foldgutter.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/xml-fold.min.js"></script>

<script src="script.js"></script>
</body>
</html>
