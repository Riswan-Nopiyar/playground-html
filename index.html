<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HTML Playground</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/foldgutter.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── DEFAULT (VSCode Dark) ── */
:root{
  --bg:#1e1e1e;--surface:#252526;--surface2:#2d2d30;
  --border:#3c3c3c;--accent:#569cd6;--accent2:#4ec9b0;--accent3:#f44747;
  --text:#d4d4d4;--text2:#858585;--text3:#6a6a6a;
  --green:#238636;
  /* syntax */
  --cm-bg:#1e1e1e;--cm-gutter:#1e1e1e;--cm-txt:#d4d4d4;--cm-line-num:#6a6a6a;
  --cm-cursor:#aeafad;--cm-sel:rgba(38,79,120,.6);--cm-active:rgba(255,255,255,.04);
  --cm-tag:#569cd6;--cm-attr:#9cdcfe;--cm-str:#ce9178;
  --cm-kw:#c586c0;--cm-def:#dcdcaa;--cm-var:#9cdcfe;
  --cm-prop:#9cdcfe;--cm-num:#b5cea8;--cm-atom:#b5cea8;
  --cm-cmt:#6a9955;--cm-op:#d4d4d4;--cm-qual:#4ec9b0;--cm-meta:#858585;
}

/* ── SUBLIME TEXT ── */
:root.sublime{
  --bg:#272822;--surface:#1e1f1c;--surface2:#2d2e2a;
  --border:#3e3d32;--accent:#a6e22e;--accent2:#66d9e8;--accent3:#f92672;
  --text:#f8f8f2;--text2:#75715e;--text3:#49483e;
  --green:#238636;
  --cm-bg:#272822;--cm-gutter:#272822;--cm-txt:#f8f8f2;--cm-line-num:#49483e;
  --cm-cursor:#f8f8f0;--cm-sel:rgba(73,72,62,.7);--cm-active:rgba(255,255,255,.04);
  --cm-tag:#f92672;--cm-attr:#a6e22e;--cm-str:#e6db74;
  --cm-kw:#66d9e8;--cm-def:#a6e22e;--cm-var:#f8f8f2;
  --cm-prop:#a6e22e;--cm-num:#ae81ff;--cm-atom:#ae81ff;
  --cm-cmt:#75715e;--cm-op:#f92672;--cm-qual:#66d9e8;--cm-meta:#75715e;
}

/* ── LIGHT ── */
:root.light{
  --bg:#ffffff;--surface:#f3f3f3;--surface2:#ebebeb;
  --border:#d4d4d4;--accent:#0066bf;--accent2:#008080;--accent3:#cd3131;
  --text:#1f1f1f;--text2:#616161;--text3:#999999;
  --green:#1a7f37;
  --cm-bg:#ffffff;--cm-gutter:#f8f8f8;--cm-txt:#1f1f1f;--cm-line-num:#999;
  --cm-cursor:#000;--cm-sel:rgba(0,102,191,.15);--cm-active:rgba(0,0,0,.04);
  --cm-tag:#800000;--cm-attr:#e50000;--cm-str:#008000;
  --cm-kw:#af00db;--cm-def:#795e26;--cm-var:#001080;
  --cm-prop:#001080;--cm-num:#098658;--cm-atom:#0000ff;
  --cm-cmt:#008000;--cm-op:#1f1f1f;--cm-qual:#008080;--cm-meta:#616161;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;transition:background .2s,color .2s}

/* TOOLBAR */
#toolbar{height:46px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:5px;padding:0 10px;flex-shrink:0}
.brand{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;margin-right:6px;color:var(--text)}
.brand svg{color:var(--accent)}
.sep{width:1px;height:18px;background:var(--border);margin:0 3px}
.btn{height:28px;padding:0 9px;border:1px solid var(--border);border-radius:5px;background:transparent;color:var(--text2);font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:color .15s,border-color .15s,background .15s;white-space:nowrap;user-select:none;vertical-align:middle}
.btn:hover{background:var(--surface2);color:var(--text);border-color:var(--accent)}
.btn.on{background:var(--surface2);color:var(--accent);border-color:var(--accent)}
select.sel{height:28px;padding:0 7px;border:1px solid var(--border);border-radius:5px;background:var(--surface2);color:var(--text2);font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;outline:none;transition:border-color .15s,color .15s}
select.sel:hover{border-color:var(--accent);color:var(--text)}
#fb{font-size:11px;font-family:'JetBrains Mono',monospace;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;color:var(--text3);min-width:32px;text-align:center;cursor:default}
.ml{margin-left:auto;display:inline-flex;align-items:center;gap:5px}

/* MAIN */
#main{display:flex;flex:1;overflow:hidden;min-height:0}

/* EDITOR PANEL */
#ep{display:flex;flex-direction:column;width:50%;min-width:150px;border-right:1px solid var(--border);flex-shrink:0;overflow:hidden;min-height:0}

/* TAB */
#tabs{height:38px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:flex-end;flex-shrink:0;padding:0 0 0 4px;overflow:hidden}
.tab{height:34px;padding:0 12px;display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text3);border:1px solid transparent;border-bottom:none;border-radius:5px 5px 0 0;background:transparent;white-space:nowrap;user-select:none}
.tab.active{color:var(--text);background:var(--bg);border-color:var(--border);border-bottom-color:var(--bg);margin-bottom:-1px}
.tdot{width:6px;height:6px;border-radius:50%;display:none;background:var(--accent3)}
.tab.mod .tdot{display:block}

/* EDITOR HOST — this must scroll */
#ew{flex:1;position:relative;overflow:hidden;min-height:0}
#cmhost{height:100%;width:100%}

/* CodeMirror fills its host */
.CodeMirror{
  height:100%!important;
  font-family:'JetBrains Mono',monospace!important;
  line-height:1.7!important;
  background:var(--cm-bg)!important;
  color:var(--cm-txt)!important;
}
.CodeMirror-scroll{overflow:auto!important}
.CodeMirror-gutters{background:var(--cm-gutter)!important;border-right:1px solid var(--border)!important}
.CodeMirror-linenumber{color:var(--cm-line-num)!important;padding:0 10px 0 6px!important}
.CodeMirror-cursor{border-left:2px solid var(--cm-cursor)!important}
.CodeMirror-selected{background:var(--cm-sel)!important}
.CodeMirror-activeline-background{background:var(--cm-active)!important}
.CodeMirror-matchingbracket{color:var(--accent2)!important;font-weight:bold}
.cm-tag{color:var(--cm-tag)!important}.cm-attribute{color:var(--cm-attr)!important}.cm-string{color:var(--cm-str)!important}
.cm-keyword{color:var(--cm-kw)!important}.cm-def{color:var(--cm-def)!important}.cm-variable{color:var(--cm-var)!important}
.cm-property{color:var(--cm-prop)!important}.cm-number{color:var(--cm-num)!important}.cm-atom{color:var(--cm-atom)!important}
.cm-comment{color:var(--cm-cmt)!important;font-style:italic}.cm-operator{color:var(--cm-op)!important}
.cm-qualifier,.cm-builtin{color:var(--cm-qual)!important}.cm-meta{color:var(--cm-meta)!important}
.CodeMirror-hints{background:#1c2128!important;border:1px solid var(--border)!important;border-radius:7px!important;box-shadow:0 8px 28px rgba(0,0,0,.5)!important;font-family:'JetBrains Mono',monospace!important;font-size:12px!important;padding:3px!important;z-index:9999!important}
.CodeMirror-hint{padding:4px 10px!important;border-radius:4px!important;color:var(--text)!important}
li.CodeMirror-hint-active{background:rgba(88,166,255,.2)!important;color:var(--accent)!important}

/* FIND BAR */
#fb-bar{position:absolute;top:6px;right:6px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:5px 8px;display:none;align-items:center;gap:5px;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.4)}
#fb-bar.on{display:flex}
.fi{background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;padding:3px 7px;width:130px;outline:none}
.fi:focus{border-color:var(--accent)}
.fbb{height:22px;padding:0 7px;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text2);font-size:11px;cursor:pointer;transition:all .15s}
.fbb:hover{color:var(--text);border-color:var(--accent)}
#fc{font-size:11px;color:var(--text3);min-width:38px;text-align:center}

/* RESIZE */
#rh{width:5px;background:var(--border);cursor:col-resize;flex-shrink:0;transition:background .15s}
#rh:hover,#rh.drag{background:var(--accent)}
#shield{display:none;position:fixed;inset:0;z-index:9999;cursor:col-resize}
#shield.on{display:block}

/* PREVIEW PANEL */
#pp{flex:1;display:flex;flex-direction:column;min-width:150px;overflow:hidden;min-height:0}
#ptabs{height:38px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:3px;flex-shrink:0}
.ptab{height:26px;padding:0 10px;border-radius:5px;font-size:12px;color:var(--text3);cursor:pointer;border:1px solid transparent;background:transparent;display:inline-flex;align-items:center;gap:4px;transition:all .15s;user-select:none}
.ptab:hover{color:var(--text2);background:var(--surface2)}
.ptab.active{color:var(--text);background:var(--surface2);border-color:var(--border)}
#pinfo{margin-left:auto;font-size:11px;color:var(--text3)}
#pframe{flex:1;border:none;background:#fff;display:block;width:100%;min-height:0}

/* CONSOLE */
#cpanel{display:none;flex:1;flex-direction:column;min-height:0;overflow:hidden}
#cpanel.on{display:flex}
#cbar{height:32px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0}
#cbar span{font-size:11px;color:var(--text3)}
#clr{margin-left:auto;height:20px;padding:0 8px;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text3);font-size:11px;cursor:pointer;transition:all .15s}
#clr:hover{color:var(--accent3);border-color:var(--accent3)}
#cout{flex:1;overflow-y:auto;padding:6px 0;font-family:'JetBrains Mono',monospace;font-size:12px;min-height:0}
#cout::-webkit-scrollbar{width:5px}
#cout::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.log{padding:3px 14px;border-bottom:1px solid rgba(48,54,61,.4);color:var(--text2);display:flex;gap:8px;line-height:1.5}
.log:hover{background:rgba(255,255,255,.02)}
.log.error{color:#f47067;border-left:2px solid #f47067}
.log.warn{color:#d29922;border-left:2px solid #d29922}
.log.info{color:var(--accent);border-left:2px solid var(--accent)}
.log .lt{color:var(--text3);min-width:58px;flex-shrink:0}
.log .lm{flex:1;word-break:break-all;white-space:pre-wrap}
.mty{padding:28px;color:var(--text3);font-size:12px;text-align:center}

/* STATUS */
#sb{height:22px;background:var(--green);display:flex;align-items:center;padding:0 10px;gap:10px;flex-shrink:0;font-size:11px;color:rgba(255,255,255,.85)}
#sb.err{background:#b62324}
.si{display:inline-flex;align-items:center;gap:3px}
.si:hover{color:#fff}
.ss{opacity:.4}
.sr{margin-left:auto;display:flex;gap:10px}

/* TOAST */
#toast{position:fixed;bottom:34px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 16px;border-radius:7px;font-size:12px;opacity:0;transition:opacity .2s,transform .2s;z-index:99999;pointer-events:none}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:var(--accent2);color:var(--accent2)}
#toast.err{border-color:var(--accent3);color:var(--accent3)}

/* MODAL */
#ov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:10000;backdrop-filter:blur(3px)}
#ov.on{display:flex}
#modal{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:22px;min-width:320px;max-width:88vw;max-height:80vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.6)}
#modal h3{font-size:15px;margin-bottom:5px}
#modal p{font-size:13px;color:var(--text2);margin-bottom:14px}
.mact{display:flex;gap:7px;justify-content:flex-end;margin-top:12px}
.mb{height:30px;padding:0 14px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;transition:all .15s}
.mb:hover{color:var(--text);border-color:var(--accent)}
.mb.pri{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}
.mb.pri:hover{opacity:.85}

@media(max-width:660px){
  #main{flex-direction:column}
  #ep{width:100%!important;max-width:100%;height:50%;border-right:none;border-bottom:1px solid var(--border)}
  #rh{display:none}
}
</style>
</head>

<div id="toolbar">
  <div class="brand">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>

    Format

  <button class="btn" id="find-btn" title="Find & Replace (Ctrl+F)">

  </button>

</div>

<div id="main">
  <div id="ep">
    <div id="tabs">
      <div class="tab active">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#f47067" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        index.html<span class="tdot"></span>
      </div>
    </div>
    <div id="ew">
      <div id="fb-bar">
        <input class="fi" id="fi-in" placeholder="Find…"/>
        <input class="fi" id="ri-in" placeholder="Replace…"/>
        <span id="fc">0/0</span>
        <button class="fbb" id="fp">↑</button>
        <button class="fbb" id="fn">↓</button>
        <button class="fbb" id="frepl">Replace</button>

      <div id="cmhost"></div>

  <div id="rh"></div>

  <div id="pp">
    <div id="ptabs">

        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Preview
      </button>
      <button class="ptab" data-v="console">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
        Console
        <span id="ebadge" style="display:none;background:#f47067;color:#fff;border-radius:9px;padding:0 5px;font-size:10px;min-width:16px;text-align:center"></span>
      </button>
      <span id="pinfo" style="margin-left:auto;font-size:11px;color:var(--text3)">—</span>
    </div>
    <iframe id="pframe" sandbox="allow-scripts allow-same-origin allow-modals allow-forms allow-popups"></iframe>
    <div id="cpanel">
      <div id="cbar">

        <button id="clr">🗑 Clear</button>

</div>

<div id="sb">

</div>

<div id="toast"></div>

<div id="ov">
  <div id="modal">
    <h3>Insert Snippet</h3>

    <div id="mbody"></div>
    <div class="mact">
      <button class="mb" id="mcancel">Cancel</button>
      <button class="mb pri" id="mok">Insert</button>
    </div>
  </div>
</div>

/* ── DEFAULT CODE ── */
const DEFAULT=`<!DOCTYPE html>

    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:#fff;border-radius:16px;padding:40px;max-width:420px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
    h1{color:#333;margin-bottom:12px;font-size:1.8rem}
    p{color:#666;line-height:1.6;margin-bottom:24px}

    button:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(102,126,234,.5)}
    #n{font-size:2.5rem;font-weight:700;color:#667eea;margin:20px 0}
  </style>
</head>
<body>
  <div class="card">
    <h1>🎉 HTML Playground</h1>
    <p>Edit kode di kiri — preview muncul otomatis di kanan.</p>
    <div id="n">0</div>
    <button onclick="document.getElementById('n').textContent=+document.getElementById('n').textContent+1">Click Me!</button>
  </div>
</body>
</html>`;

/* ── FONT SIZE ── */
// Sizes array
const FSZ=[11,12,13,14,15,16,17,18,20];
let fsi=parseInt(localStorage.getItem('fsi')||'2'); // default index 2 = 13px

function setFS(i){
  fsi=Math.max(0,Math.min(FSZ.length-1,i));
  const sz=FSZ[fsi];
  localStorage.setItem('fsi',fsi);
  document.getElementById('fb').textContent=sz;
  // Apply font size to CodeMirror by updating its wrapper style
  // CodeMirror uses its own font-size on .CodeMirror element
  const cmEl=document.querySelector('#cmhost .CodeMirror');
  if(cmEl){
    cmEl.style.fontSize=sz+'px';
    // Refresh so line heights recompute
    if(window.cm) window.cm.refresh();
  }
  toast('Font: '+sz+'px');
}

document.getElementById('fi').onclick=()=>setFS(fsi+1);
document.getElementById('fd').onclick=()=>setFS(fsi-1);

/* ── THEME ── */
// All three themes are pure CSS variables — no external CDN needed.
// We switch by adding/removing a class on <html>.
function applyTheme(name){
  const root=document.documentElement;
  root.classList.remove('sublime','light');
  if(name==='sublime') root.classList.add('sublime');
  else if(name==='light') root.classList.add('light');
  // Keep CM theme as 'default' always — we override all colors via CSS vars
  if(window.cm) window.cm.setOption('theme','default');
  localStorage.setItem('th',name);
  // Force CM to repaint
  setTimeout(()=>{ if(window.cm) window.cm.refresh(); },10);
}

const savedTheme=localStorage.getItem('th')||'vscode';
document.getElementById('theme-sel').value=savedTheme;
document.getElementById('theme-sel').onchange=function(){applyTheme(this.value);};

/* ── INIT CODEMIRROR ── */
const VOID=new Set(['area','base','br','col','embed','hr','img','input','link','meta','param','source','track','wbr']);
const ETAGS=['div','span','p','a','img','ul','ol','li','h1','h2','h3','h4','h5','h6','section','article','header','footer','nav','main','aside','form','input','button','textarea','select','option','label','table','tr','td','th','thead','tbody','script','style','link','meta','figure','figcaption','details','summary','dialog','video','audio','canvas','svg','path','blockquote','pre','code','em','strong','br','hr','iframe'];

window.cm=CodeMirror(document.getElementById('cmhost'),{
  value:localStorage.getItem('code')||DEFAULT,
  mode:'htmlmixed',
  lineNumbers:true,
  indentUnit:2,tabSize:2,indentWithTabs:false,
  theme:'default',
  autoCloseTags:true,autoCloseBrackets:true,matchBrackets:true,
  styleActiveLine:true,lineWrapping:false,
  foldGutter:true,
  gutters:['CodeMirror-linenumbers','CodeMirror-foldgutter'],
  extraKeys:{
    'Ctrl-Enter':runCode,
    'Ctrl-Space':'autocomplete',
    'Shift-Alt-F':fmtCode,
    'Ctrl-/':'toggleComment',
    Tab(c){
      if(c.somethingSelected()){c.indentSelection('add');return;}
      const cur=c.getCursor(),ln=c.getLine(cur.line),before=ln.slice(0,cur.ch);
      const m=before.match(/(\S+)$/);
      if(m&&emmet(c,m[1]))return;
      c.replaceSelection('  ');
    }
  },
  hintOptions:{completeSingle:false}
});

// After CodeMirror is initialized, apply saved font size and theme
setTimeout(()=>{
  setFS(fsi);
  applyTheme(savedTheme);
},0);

/* ── EMMET ── */
function emmet(c,trigger){
  const m=trigger.match(/^([a-z][a-z0-9]*)(?:\.([a-z][a-z0-9-]*))?(?:#([a-z][a-z0-9-]*))?$/i);
  if(!m||!ETAGS.includes(m[1]))return false;
  const tag=m[1],cls=m[2]?` class="${m[2]}"`:'',id=m[3]?` id="${m[3]}"`:'';
  const exp=VOID.has(tag)?`<${tag}${id}${cls}/>`:`<${tag}${id}${cls}></${tag}>`;
  const cur=c.getCursor();
  c.replaceRange(exp,{line:cur.line,ch:cur.ch-trigger.length},cur);
  if(!VOID.has(tag)) c.setCursor({line:cur.line,ch:cur.ch-trigger.length+tag.length+id.length+cls.length+2});
  return true;
}

/* ── AUTOCOMPLETE ── */
let act;
cm.on('keyup',(c,e)=>{
  if([13,27,37,38,39,40,9,16,17,18,91].includes(e.keyCode))return;
  if(c.state.completionActive)return;
  clearTimeout(act);
  act=setTimeout(()=>{
    if(c.getTokenAt(c.getCursor()).string.length>=1)
      CodeMirror.commands.autocomplete(c,null,{completeSingle:false});
  },150);
});

/* ── CONSOLE ── */
let logs=[],errs=0;
function clrCons(){
  logs=[];errs=0;
  document.getElementById('cout').innerHTML='<div class="mty">No output yet.</div>';
  document.getElementById('ccount').textContent='0 messages';
  document.getElementById('ebadge').style.display='none';
  document.getElementById('sb').classList.remove('err');
}
document.getElementById('clr').onclick=clrCons;

window.addEventListener('message',e=>{
  if(!e.data||e.data.type!=='pg')return;
  const{level,msg,time}=e.data;
  logs.push({level,msg,time});
  const out=document.getElementById('cout');
  out.querySelector('.mty')?.remove();
  const d=document.createElement('div');
  d.className='log '+level;
  d.innerHTML=`<span class="lt">${time}</span><span class="lm">${esc(msg)}</span>`;
  out.appendChild(d);
  out.scrollTop=out.scrollHeight;
  document.getElementById('ccount').textContent=logs.length+' message'+(logs.length!==1?'s':'');
  if(level==='error'){
    errs++;
    const b=document.getElementById('ebadge');
    b.style.display='inline';b.textContent=errs;
    document.getElementById('sb').classList.add('err');
  }
});
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ── RUN CODE ── */
let liveOn=true,liveT;

function runCode(){
  clrCons();
  const code=cm.getValue();
  const frame=document.getElementById('pframe');
  // Console interceptor
  const ic=`<`+`script>(function(){
var ol=console.log,ow=console.warn,oe=console.error,oi=console.info;
function s(lv,a){try{var msg=Array.from(a).map(function(x){if(x===null)return'null';if(x===undefined)return'undefined';if(typeof x==='object'){try{return JSON.stringify(x,null,2)}catch(er){return String(x)}}return String(x);}).join(' ');window.parent.postMessage({type:'pg',level:lv,msg:msg,time:new Date().toLocaleTimeString()},'*');}catch(er){}}
console.log=function(){ol.apply(console,arguments);s('log',arguments);};
console.warn=function(){ow.apply(console,arguments);s('warn',arguments);};
console.error=function(){oe.apply(console,arguments);s('error',arguments);};
console.info=function(){oi.apply(console,arguments);s('info',arguments);};
window.onerror=function(msg,src,ln){s('error',[msg+' (ln '+ln+')']);return false;};
}());<`+`/script>`;
  let out=code;
  if(code.includes('</head>'))out=code.replace('</head>',ic+'</head>');
  else if(code.includes('<body>'))out=code.replace('<body>','<body>'+ic);
  else out=ic+code;
  const doc=frame.contentDocument||frame.contentWindow.document;
  doc.open();doc.write(out);doc.close();
  setTimeout(()=>{
    const w=frame.offsetWidth,h=frame.offsetHeight;
    document.getElementById('sbdim').textContent=`${w}×${h}`;
    document.getElementById('pinfo').textContent=`${w}×${h}px`;
  },120);
}

/* ── LIVE PREVIEW ── */
cm.on('change',()=>{
  document.querySelector('.tab.active')?.classList.add('mod');
  localStorage.setItem('code',cm.getValue());
  updSb();
  if(!liveOn)return;
  clearTimeout(liveT);
  liveT=setTimeout(runCode,700);
});

document.getElementById('sblive').onclick=()=>{
  liveOn=!liveOn;
  document.getElementById('sblive').textContent=liveOn?'● Live':'○ Manual';
  toast(liveOn?'Live on':'Manual mode');
};

/* ── STATUS BAR ── */
cm.on('cursorActivity',updSb);
function updSb(){
  const c=cm.getCursor();
  document.getElementById('sbpos').textContent=`Ln ${c.line+1}, Col ${c.ch+1}`;
  const b=new Blob([cm.getValue()]).size;
  document.getElementById('sbsz').textContent=b<1024?b+' B':(b/1024).toFixed(1)+' KB';
}

/* ── FORMAT ── */
function fmtCode(){
  try{
    let s=cm.getValue().replace(/>\s*</g,'>\n<').replace(/(<[^\/!][^>]*[^\/]>)([^\n])/g,'$1\n$2').replace(/([^\n])(<\/[^>]+>)/g,'$1\n$2');
    let ind=0;
    const r=s.split('\n').map(l=>{
      l=l.trim();if(!l)return'';
      if(l.match(/^<\/[^>]+>/))ind=Math.max(0,ind-1);
      const o='  '.repeat(ind)+l;
      if(l.match(/^<[^\/!][^>]*[^\/]>$/)&&!l.match(/^<(area|base|br|col|embed|hr|img|input|link|meta|param|source|track|wbr)/i))ind++;
      return o;
    }).filter((l,i,a)=>!(l===''&&a[i-1]==='')).join('\n');
    cm.setValue(r);toast('Formatted ✓','ok');
  }catch(e){toast('Format error','err');}
}
document.getElementById('fmt-btn').onclick=fmtCode;

/* ── WRAP ── */
let wrap=false;
document.getElementById('wrap-btn').onclick=()=>{
  wrap=!wrap;cm.setOption('lineWrapping',wrap);
  document.getElementById('wrap-btn').classList.toggle('on',wrap);
  toast(wrap?'Wrap on':'Wrap off');
};

/* ── FIND & REPLACE ── */
const fbar=document.getElementById('fb-bar');
let matches=[],mi=0;
document.getElementById('find-btn').onclick=toggleFind;
document.getElementById('fclose').onclick=closeFind;
function toggleFind(){fbar.classList.toggle('on');if(fbar.classList.contains('on')){const s=cm.getSelection();if(s)document.getElementById('fi-in').value=s;document.getElementById('fi-in').focus();doSearch();}}
function closeFind(){fbar.classList.remove('on');cm.focus();}
document.getElementById('fi-in').oninput=doSearch;
function doSearch(){
  const q=document.getElementById('fi-in').value;matches=[];
  if(!q){document.getElementById('fc').textContent='0/0';return;}
  const cur=cm.getSearchCursor(q,{line:0,ch:0},{caseFold:true});
  while(cur.findNext())matches.push({from:cur.from(),to:cur.to()});
  document.getElementById('fc').textContent=matches.length?`1/${matches.length}`:'0/0';
  if(matches.length)hlM(0);
}
function hlM(i){if(!matches.length)return;mi=((i%matches.length)+matches.length)%matches.length;cm.setSelection(matches[mi].from,matches[mi].to);cm.scrollIntoView({from:matches[mi].from,to:matches[mi].to},80);document.getElementById('fc').textContent=`${mi+1}/${matches.length}`;}
document.getElementById('fn').onclick=()=>hlM(mi+1);
document.getElementById('fp').onclick=()=>hlM(mi-1);
document.getElementById('fi-in').onkeydown=e=>{if(e.key==='Enter'){e.shiftKey?hlM(mi-1):hlM(mi+1);}if(e.key==='Escape')closeFind();};
document.getElementById('frepl').onclick=()=>{if(!matches.length)return;cm.replaceRange(document.getElementById('ri-in').value,matches[mi].from,matches[mi].to);doSearch();toast('Replaced','ok');};

/* ── PREVIEW TABS ── */
document.querySelectorAll('.ptab').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.ptab').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    const v=b.dataset.v;
    document.getElementById('pframe').style.display=v==='preview'?'block':'none';
    const cp=document.getElementById('cpanel');
    if(v==='console'){cp.classList.add('on');errs=0;document.getElementById('ebadge').style.display='none';document.getElementById('sb').classList.remove('err');}
    else cp.classList.remove('on');
  };
});

/* ── COPY ── */
document.getElementById('copy-btn').onclick=()=>navigator.clipboard.writeText(cm.getValue()).then(()=>toast('Copied ✓','ok')).catch(()=>toast('Copy failed','err'));

/* ── SNIPPETS ── */
const SNIPS=[
  {n:'Boilerplate',i:'📄',full:true,c:DEFAULT},
  {n:'Flexbox Center',i:'📦',c:`<div style="display:flex;align-items:center;justify-content:center;height:200px;background:#f0f0f0;">\n  <p>Centered Content</p>\n</div>`},
  {n:'CSS Card',i:'🃏',c:`<div style="background:#fff;border-radius:12px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,.1);max-width:320px;margin:20px auto;">\n  <h2>Card Title</h2>\n  <p style="color:#666;line-height:1.6">Description.</p>\n</div>`},
  {n:'Navbar',i:'🧭',c:`<nav style="display:flex;align-items:center;padding:0 24px;background:#1a1a2e;height:56px;gap:24px;">\n  <span style="font-weight:700;color:#fff;font-size:18px">Logo</span>\n  <a href="#" style="color:rgba(255,255,255,.7);text-decoration:none">Home</a>\n  <button style="margin-left:auto;background:#7c3aed;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer">Sign Up</button>\n</nav>`},
  {n:'Form',i:'📝',c:`<form style="max-width:400px;margin:40px auto;padding:32px;background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1);">\n  <h2 style="margin-bottom:20px">Contact</h2>\n  <input type="text" placeholder="Name" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;margin-bottom:12px;display:block;font-size:14px"/>\n  <input type="email" placeholder="Email" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;margin-bottom:16px;display:block;font-size:14px"/>\n  <button style="width:100%;background:#3b82f6;color:#fff;border:none;padding:12px;border-radius:6px;font-size:15px;cursor:pointer">Send</button>\n</form>`},
  {n:'CSS Grid',i:'🔲',c:`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:20px;">\n  <div style="background:#6366f1;color:#fff;padding:32px;border-radius:8px;text-align:center">1</div>\n  <div style="background:#8b5cf6;color:#fff;padding:32px;border-radius:8px;text-align:center">2</div>\n  <div style="background:#a78bfa;color:#fff;padding:32px;border-radius:8px;text-align:center">3</div>\n</div>`},
  {n:'Animated Button',i:'✨',c:`<style>.ba{background:linear-gradient(135deg,#6366f1,#a855f7);color:#fff;border:none;padding:14px 32px;border-radius:50px;font-size:16px;cursor:pointer;transition:transform .2s,box-shadow .2s}.ba:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(99,102,241,.5)}</style>\n<div style="display:flex;justify-content:center;padding:60px"><button class="ba">Hover Me!</button></div>`},
  {n:'Console Demo',i:'🖥️',c:`<`+`script>console.log('Hello!');console.warn('Warning');console.error('Error');console.info({name:'Playground',v:2});<`+`/script>\n<p style="font-family:sans-serif;padding:20px">→ Lihat tab Console</p>`},
];

let sel=null;
document.getElementById('snip-btn').onclick=()=>{
  const mb=document.getElementById('mbody');mb.innerHTML='';sel=null;
  SNIPS.forEach((s,i)=>{
    const b=document.createElement('button');
    b.style.cssText='display:flex;align-items:center;gap:9px;width:100%;padding:9px 11px;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:Inter,sans-serif;font-size:13px;cursor:pointer;margin-bottom:5px;transition:all .15s';
    b.innerHTML=`<span style="font-size:17px">${s.i}</span>${s.n}`;
    b.onclick=()=>{sel=i;mb.querySelectorAll('button').forEach(x=>{x.style.borderColor='var(--border)';x.style.background='transparent'});b.style.borderColor='var(--accent)';b.style.background='rgba(88,166,255,.1)';};
    mb.appendChild(b);
  });
  document.getElementById('ov').classList.add('on');
};
document.getElementById('mcancel').onclick=()=>document.getElementById('ov').classList.remove('on');
document.getElementById('mok').onclick=()=>{
  if(sel===null){toast('Pilih snippet dulu','err');return;}
  const s=SNIPS[sel];
  if(s.full)cm.setValue(s.c);else cm.replaceRange('\n'+s.c,cm.getCursor());
  document.getElementById('ov').classList.remove('on');
  toast('Inserted: '+s.n,'ok');runCode();
};

/* ── RESIZE ── */
const rh=document.getElementById('rh'),ep=document.getElementById('ep'),mn=document.getElementById('main'),sh=document.getElementById('shield');
let drag=false,rx,rw;
rh.addEventListener('mousedown',e=>{drag=true;rx=e.clientX;rw=ep.offsetWidth;rh.classList.add('drag');sh.classList.add('on');e.preventDefault();});
document.addEventListener('mousemove',e=>{if(!drag)return;ep.style.width=Math.max(150,Math.min(mn.offsetWidth-150,rw+e.clientX-rx))+'px';});
document.addEventListener('mouseup',()=>{if(!drag)return;drag=false;rh.classList.remove('drag');sh.classList.remove('on');cm.refresh();const f=document.getElementById('pframe');document.getElementById('sbdim').textContent=`${f.offsetWidth}×${f.offsetHeight}`;document.getElementById('pinfo').textContent=`${f.offsetWidth}×${f.offsetHeight}px`;});

/* ── KEYBOARD ── */
document.addEventListener('keydown',e=>{
  if(e.ctrlKey&&e.key==='f'){e.preventDefault();toggleFind();}
  if(e.ctrlKey&&e.key==='Enter'){e.preventDefault();runCode();}
  if(e.key==='Escape'){closeFind();document.getElementById('ov').classList.remove('on');}
});

/* ── WINDOW RESIZE ── */
window.addEventListener('resize',()=>{cm.refresh();const f=document.getElementById('pframe');document.getElementById('sbdim').textContent=`${f.offsetWidth}×${f.offsetHeight}`;});

/* ── TOAST ── */
let tt;
function toast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='on'+(type?' '+type:'');clearTimeout(tt);tt=setTimeout(()=>t.className='',2000);}

/* ── START ── */
runCode();
updSb();
</script>
